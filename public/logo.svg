<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Teardrop shape pointing straight up, bulb centered around (0,0) -->
    <path id="drop" d="M 0,-24 C -6,-12 -15,-4 -15,4 A 15,15 0 1 0 15,4 C 15,-4 6,-12 0,-24 Z" />
  </defs>

  <g style="isolation: isolate;">
    <!-- Cyan drop (left-hand side, rotated to point up-left) -->
    <use href="#drop" x="37" y="50" transform="rotate(-65 37 50)" fill="#00A3E0" opacity="0.9" style="mix-blend-mode: multiply;" />

    <!-- Yellow drop (right-hand side, rotated to point up-right) -->
    <use href="#drop" x="63" y="50" transform="rotate(65 63 50)" fill="#FCD116" opacity="0.9" style="mix-blend-mode: multiply;" />

    <!-- Magenta drop (bottom, rotated to point down) -->
    <use href="#drop" x="50" y="62" transform="rotate(180 50 62)" fill="#D10074" opacity="0.9" style="mix-blend-mode: multiply;" />

    <!-- Dark grey/black drop (top, pointing straight up) -->
    <use href="#drop" x="50" y="38" fill="#3D3D3D" opacity="0.9" style="mix-blend-mode: multiply;" />

    <!-- Elegant serif letter G centered overlay -->
    <text x="50" y="58" font-family="'Georgia', 'Times New Roman', serif" font-size="36" font-weight="normal" fill="#FFFFFF" text-anchor="middle" opacity="0.95" style="letter-spacing: 0px;">G</text>
  </g>
</svg>
